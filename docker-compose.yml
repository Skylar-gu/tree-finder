services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trees}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trees}
      POSTGRES_DB: ${POSTGRES_DB:-trees}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trees} -d ${POSTGRES_DB:-trees}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-trees}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trees}
      POSTGRES_DB: ${POSTGRES_DB:-trees}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
      RUN_MIGRATIONS: "1"
      SEED_SAMPLE: ${SEED_SAMPLE:-1}   # seed the offline sample on first boot
    ports:
      - "8000:8000"
    # start.sh: migrate, optionally seed, then serve via gunicorn/uvicorn workers.

volumes:
  pgdata:
